<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JAMBA | Men's Collection</title>
    <style>
        /* --- GLOBAL STYLES (Same as Home Page) --- */
        body {
            margin: 0;
            padding: 0;
            background-color: #f5f5f5;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            color: #1a1a1a;
            padding-top: 80px; 
        }

        a {
            text-decoration: none;
            color: inherit;
        }

        /* --- NAVIGATION BAR (Same as Home Page) --- */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 5%;
            position: fixed;
            top: 0;
            width: 100%;
            box-sizing: border-box;
            background-color: rgba(245, 245, 245, 0.95);
            backdrop-filter: blur(8px);
            box-shadow: 0 2px 15px rgba(0, 0, 0, 0.05);
            z-index: 1000;
        }

        .Nav {
            display: flex;
            gap: 35px;
            list-style: none;
            margin: 0;
            padding: 0;
        }

        .Nav a {
            font-size: 15px;
            font-weight: 500;
            letter-spacing: 1px;
            transition: color 0.3s ease;
        }

        .Nav a:hover {
            color: #d2b48c;
        }

        /* --- CATEGORY HEADER --- */
        .category-header {
            text-align: center;
            padding: 60px 20px;
            background-color: #e0e0e0; /* Subtle grey background for the header */
            margin-bottom: 40px;
        }

        .category-title {
            font-size: 36px;
            letter-spacing: 4px;
            text-transform: uppercase;
            margin: 0 0 10px 0;
        }

        .category-subtitle {
            color: #666;
            font-size: 16px;
            letter-spacing: 1px;
        }

        /* --- PRODUCT GRID --- */
        .product-grid {
            display: flex;
            justify-content: center;
            gap: 40px;
            padding: 0 5%;
            margin-bottom: 80px;
            flex-wrap: wrap; 
        }

        .product-card {
            width: 300px;
            text-align: center;
            cursor: pointer;
            margin-bottom: 40px; /* Space between rows */
        }

        .product-image {
            width: 100%;
            height: 400px;
            background-color: #eaeaea; 
            object-fit: cover;
            transition: transform 0.4s ease;
        }

        .product-card:hover .product-image {
            transform: scale(1.03); 
        }

        .product-title {
            margin: 15px 0 5px;
            font-size: 16px;
            letter-spacing: 1px;
        }

        .product-price {
            color: #666;
            font-size: 15px;
        }
    </style>
</head>
<body>

    <header class="top-bar">
        <div class="logo">
            <a href="index.html">
                <img src="https://cdn.jsdelivr.net/gh/jamba4334-cmd/JAMBA@main/assets/JAMBA.png" alt="JAMBA Logo" height="40">
            </a>
        </div>
        <ul class="Nav">
            <li><a href="men.html">Men</a></li>
            <li><a href="women.html">Women</a></li>
            <li><a href="login.html">Login</a></li>
            <li><a href="cart.html">Cart (0)</a></li>
        </ul>
    </header>

    <section class="category-header">
        <h1 class="category-title">Men's Collection</h1>
        <p class="category-subtitle">Elevated essentials and modern tailoring.</p>
    </section>

    <section class="product-grid">
        
        <div class="product-card" onclick="window.location.href='product-waistcoat.html'">
            <img class="product-image" src="https://cdn.jsdelivr.net/gh/jamba4334-cmd/JAMBA@main/waistcoat.png" alt="Linen Waistcoat">
            <h3 class="product-title">Classic Linen Waistcoat</h3>
            <p class="product-price">₹ 2,999</p>
        </div>

        <div class="product-card" onclick="window.location.href='product2.html'">
            <img class="product-image" src="https://cdn.jsdelivr.net/gh/jamba4334-cmd/JAMBA@main/Pinkshirt.png" alt="Oxford Shirt">
            <h3 class="product-title">Tailored Oxford Shirt</h3>
            <p class="product-price">₹ 1,699</p>
        </div>

        <div class="product-card" onclick="window.location.href='product3.html'">
            <img class="product-image" src="https://cdn.jsdelivr.net/gh/jamba4334-cmd/JAMBA@main/GoldenShirt.png" alt="Wool Trousers">
            <h3 class="product-title">Pleated Wool Trousers</h3>
            <p class="product-price">₹ 1,699</p>
        </div>

        <div class="product-card" onclick="window.location.href='product4.html'">
            <img class="product-image" src="https://cdn.jsdelivr.net/gh/jamba4334-cmd/JAMBA@main/Blueshirt.png" alt="Knit Polo">
            <h3 class="product-title">Silk-Blend Knit Polo</h3>
            <p class="product-price">₹ 1,699</p>
        </div>

        <div class="product-card" onclick="window.location.href='product4.html'">
            <img class="product-image" src="https://cdn.jsdelivr.net/gh/jamba4334-cmd/JAMBA@main/Blueshirt.png" alt="Knit Polo">
            <h3 class="product-title">Silk-Blend Knit Polo</h3>
            <p class="product-price">₹ 1,699</p>
        </div>

        <div class="product-card" onclick="window.location.href='product4.html'">
            <img class="product-image" src="https://cdn.jsdelivr.net/gh/jamba4334-cmd/JAMBA@main/Blueshirt.png" alt="Knit Polo">
            <h3 class="product-title">Silk-Blend Knit Polo</h3>
            <p class="product-price">₹ 1,699</p>
        </div>


    </section>

</body>
</html>
