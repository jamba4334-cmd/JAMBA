\<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JAMBA | Official Store</title>
    <style>
        /* --- GLOBAL STYLES --- */
        body {
            margin: 0;
            padding: 0;
            background-color: #f5f5f5;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            color: #1a1a1a;
            padding-top: 70px; /* Adjusted for mobile header height */
        }

        a { text-decoration: none; color: inherit; }

        /* --- NAVIGATION BAR --- */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 5%;
            position: fixed;
            top: 0;
            width: 100%;
            box-sizing: border-box;
            background-color: rgba(245, 245, 245, 0.95);
            backdrop-filter: blur(8px);
            box-shadow: 0 2px 15px rgba(0, 0, 0, 0.05);
            z-index: 1000;
        }

        .Nav {
            display: flex;
            gap: 15px; /* Reduced gap for small screens */
            list-style: none;
            margin: 0;
            padding: 0;
        }

        .Nav a {
            font-size: 13px; /* Slightly smaller for mobile */
            font-weight: 500;
            text-transform: uppercase;
        }

        /* --- HERO SECTION --- */
        .hero {
            display: flex;
            flex-direction: column; /* Stack vertically on mobile */
            height: auto; 
            width: 100%;
        }

        .hero-split {
            flex: 1;
            height: 40vh; /* Fixed height for mobile segments */
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #e0e0e0;
        }

        .hero-split.men { background-color: #d1d1d1; }
        .hero-split.women { background-color: #e8e8e8; }

        .shop-btn {
            padding: 12px 30px;
            background-color: #1a1a1a;
            color: white;
            font-size: 14px;
            letter-spacing: 2px;
            text-transform: uppercase;
            border: none;
            cursor: pointer;
        }

        /* --- PRODUCT GRID --- */
        .section-title {
            text-align: center;
            margin: 40px 0 20px;
            font-size: 22px;
            letter-spacing: 2px;
        }

        .product-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr); /* 2 items per row on mobile */
            gap: 15px;
            padding: 0 15px;
            margin-bottom: 50px;
        }

        .product-card {
            width: 100%;
            text-align: center;
        }

        .product-image {
            width: 100%;
            height: auto; /* Maintains aspect ratio */
            aspect-ratio: 3 / 4; /* Keeps images consistent */
            background-color: #eaeaea;
            object-fit: cover;
        }

        .product-title {
            margin: 10px 0 5px;
            font-size: 14px;
        }

        .product-price {
            color: #666;
            font-size: 13px;
        }

        /* --- TABLET & DESKTOP OVERRIDES --- */
        @media (min-width: 768px) {
            .hero { flex-direction: row; height: 70vh; }
            .hero-split { height: 100%; }
            .Nav { gap: 35px; }
            .Nav a { font-size: 15px; }
            .product-grid {
                grid-template-columns: repeat(3, 1fr); /* 3 items on desktop */
                padding: 0 5%;
                gap: 40px;
            }
            .section-title { font-size: 28px; }
        }
    </style>
</head>
<body>

    <header class="top-bar">
        <div class="logo">
            <img src="https://raw.githubusercontent.com/jamba4334-cmd/JAMBA/main/assets/JAMBA.png" alt="JAMBA Logo" height="30">
        </div>
        <ul class="Nav">
            <li><a href="men.html">Men</a></li>
            <li><a href="women.html">Women</a></li>
            <li><a href="#">Cart (0)</a></li>
        </ul>
    </header>

    <section class="hero">
        <div class="hero-split women">
            <a href="women.html"><button class="shop-btn">Shop Women</button></a>
        </div>
        <div class="hero-split men">
            <a href="men.html"><button class="shop-btn">Shop Men</button></a>
        </div>
    </section>

    <h2 class="section-title">New Arrivals</h2>
    <section class="product-grid">
        <div class="product-card" onclick="window.location.href='product1.html'">
            <img class="product-image" src="https://cdn.jsdelivr.net/gh/jamba4334-cmd/JAMBA@main/waistcoat.png" alt="Linen Waistcoat">
            <h3 class="product-title">Classic Linen Waistcoat</h3>
            <p class="product-price">₹ 85.00</p>
        </div>

        <div class="product-card" onclick="window.location.href='product2.html'">
            <img class="product-image" src="https://cdn.jsdelivr.net/gh/jamba4334-cmd/JAMBA@main/GoldenShirt.png" alt="Tailored Shirt">
            <h3 class="product-title">Tailored Oxford Shirt</h3>
            <p class="product-price">₹ 95.00</p>
        </div>

        <div class="product-card" onclick="window.location.href='product3.html'">
            <img class="product-image" src="https://cdn.jsdelivr.net/gh/jamba4334-cmd/JAMBA@main/Pinkshirt.png" alt="Pleated Trousers">
            <h3 class="product-title">Pleated Wool Trousers</h3>
            <p class="product-price">₹ 120.00</p>
        </div>
    </section>

</body>
</html>
