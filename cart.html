<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JAMBA | Shopping Cart</title>
    <style>
        /* --- GLOBAL STYLES & NAVIGATION --- */
        body {
            margin: 0;
            padding: 0;
            background-color: #f5f5f5;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            color: #1a1a1a;
            padding-top: 80px; 
        }

        a { text-decoration: none; color: inherit; }

        .top-bar {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 5%; position: fixed; top: 0; width: 100%; box-sizing: border-box;
            background-color: rgba(245, 245, 245, 0.95); backdrop-filter: blur(8px);
            box-shadow: 0 2px 15px rgba(0, 0, 0, 0.05); z-index: 1000;
        }

        .Nav { display: flex; gap: 35px; list-style: none; margin: 0; padding: 0; }
        .Nav a { font-size: 15px; font-weight: 500; letter-spacing: 1px; transition: color 0.3s ease; }
        .Nav a:hover { color: #d2b48c; }

        /* --- CART LAYOUT --- */
        .cart-container {
            max-width: 1200px;
            margin: 60px auto; 
            padding: 0 5%;
        }

        .cart-header {
            font-size: 32px;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 40px;
            border-bottom: 1px solid #ddd;
            padding-bottom: 20px;
        }

        .cart-content {
            display: flex;
            gap: 60px;
            align-items: flex-start;
        }

        /* Left Side: Items in Cart */
        .cart-items-section {
            flex: 2; /* Takes up 2/3 of the space */
        }

        .cart-item {
            display: flex;
            gap: 30px;
            padding-bottom: 30px;
            margin-bottom: 30px;
            border-bottom: 1px solid #ddd;
        }

        .item-image {
            width: 150px;
            height: 200px;
            object-fit: cover;
            background-color: #eaeaea;
        }

        .item-details {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .item-title {
            font-size: 20px;
            margin: 0 0 10px 0;
            letter-spacing: 1px;
        }

        .item-variant {
            color: #666;
            font-size: 14px;
            margin: 0 0 20px 0;
        }

        .item-actions {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-top: auto; /* Pushes actions to the bottom */
        }

        .qty-input {
            width: 50px;
            padding: 8px;
            text-align: center;
            border: 1px solid #ccc;
            font-family: inherit;
        }

        .remove-btn {
            background: none;
            border: none;
            color: #888;
            cursor: pointer;
            text-decoration: underline;
            font-size: 14px;
        }

        .remove-btn:hover { color: #1a1a1a; }

        .item-price {
            font-size: 18px;
            font-weight: bold;
        }

        /* Right Side: Order Summary */
        .order-summary {
            flex: 1; /* Takes up 1/3 of the space */
            background-color: #ffffff;
            padding: 30px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.03);
        }

        .summary-title {
            font-size: 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin: 0 0 20px 0;
            border-bottom: 1px solid #ddd;
            padding-bottom: 15px;
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            color: #444;
        }

        .summary-total {
            display: flex;
            justify-content: space-between;
            font-size: 20px;
            font-weight: bold;
            color: #1a1a1a;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #ddd;
        }

        .checkout-btn {
            width: 100%;
            padding: 18px 0;
            margin-top: 30px;
            background-color: #1a1a1a;
            color: white;
            font-size: 16px;
            letter-spacing: 2px;
            text-transform: uppercase;
            border: none;
            cursor: pointer;
            transition: background 0.3s ease;
        }

        .checkout-btn:hover {
            background-color: #d2b48c;
        }
    </style>
</head>
<body>

    <header class="top-bar">
        <div class="logo">
            <a href="index.html">
                <img src="https://cdn.jsdelivr.net/gh/jamba4334-cmd/JAMBA@main/assets/JAMBA.png" alt="JAMBA Logo" height="40">
            </a>
        </div>
        <ul class="Nav">
            <li><a href="men.html">Men</a></li>
            <li><a href="women.html">Women</a></li>
            <li><a href="login.html">Login</a></li>
            <li><a href="cart.html" style="font-weight: bold;">Cart (1)</a></li>
        </ul>
    </header>

    <main class="cart-container">
        <h1 class="cart-header">Your Cart</h1>
        
        <div class="cart-content">
            
            <section class="cart-items-section">
                
                <div class="cart-item">
                    <img src="https://cdn.jsdelivr.net/gh/jamba4334-cmd/JAMBA@main/waistcoat.png" alt="Classic Linen Waistcoat" class="item-image">
                    
                    <div class="item-details">
                        <h2 class="item-title">Classic Linen Waistcoat</h2>
                        <p class="item-variant">Size: M | Color: Natural</p>
                        
                        <div class="item-actions">
                            <input type="number" class="qty-input" value="1" min="1">
                            <button class="remove-btn">Remove</button>
                        </div>
                    </div>

                    <div class="item-price">$85.00</div>
                </div>

            </section>

            <section class="order-summary">
                <h2 class="summary-title">Order Summary</h2>
                
                <div class="summary-row">
                    <span>Subtotal</span>
                    <span>$85.00</span>
                </div>
                <div class="summary-row">
                    <span>Shipping</span>
                    <span>Calculated at checkout</span>
                </div>
                
                <div class="summary-total">
                    <span>Total</span>
                    <span>$85.00</span>
                </div>

                <button class="checkout-btn" onclick="window.location.href='checkout.html'">Proceed to Checkout</button>
            </section>

        </div>
    </main>

</body>
</html>
