<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JAMBA WEAR | Shopping Cart</title>
    <style>
        /* --- GLOBAL STYLES --- */
        body { margin: 0; padding-top: 70px; background-color: #f5f5f5; font-family: 'Helvetica Neue', sans-serif; color: #1a1a1a; }
        a { text-decoration: none; color: inherit; }

        /* --- NAVIGATION --- */
        .top-bar { display: flex; justify-content: space-between; align-items: center; padding: 10px 5%; position: fixed; top: 0; width: 100%; box-sizing: border-box; background-color: rgba(245, 245, 245, 0.95); backdrop-filter: blur(8px); box-shadow: 0 2px 15px rgba(0, 0, 0, 0.05); z-index: 1000; }
        .Nav { display: flex; gap: 15px; list-style: none; margin: 0; padding: 0; }
        .Nav a { font-size: 13px; font-weight: 500; text-transform: uppercase; letter-spacing: 1px; }

        /* --- CART LAYOUT --- */
        .cart-container { max-width: 1200px; margin: 30px auto; padding: 0 5%; }
        .cart-header { font-size: 24px; text-transform: uppercase; margin-bottom: 20px; border-bottom: 1px solid #ddd; padding-bottom: 15px; }
        .cart-content { display: flex; flex-direction: column; gap: 40px; }

        /* Left Side: Items */
        .cart-items-section { width: 100%; }
        .cart-item { display: grid; grid-template-columns: 100px 1fr; gap: 15px; padding-bottom: 20px; margin-bottom: 20px; border-bottom: 1px solid #ddd; }
        .item-image { width: 100%; height: 130px; object-fit: cover; border-radius: 4px; }
        .item-details { display: flex; flex-direction: column; justify-content: space-between; }
        .item-title { font-size: 16px; margin: 0 0 5px 0; }
        .item-variant { color: #666; font-size: 13px; margin: 0 0 10px 0; }
        .item-price { font-size: 16px; font-weight: bold; margin-bottom: 10px; }
        .item-actions { display: flex; justify-content: space-between; align-items: center; }
        .remove-btn { background: none; border: none; color: #d9534f; cursor: pointer; text-decoration: underline; font-size: 13px; padding: 0; }

        /* Right Side: Summary */
        .order-summary { width: 100%; background-color: #fff; padding: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.03); border-radius: 4px; }
        .summary-title { font-size: 18px; text-transform: uppercase; margin: 0 0 15px 0; border-bottom: 1px solid #ddd; padding-bottom: 10px; }
        .summary-row { display: flex; justify-content: space-between; margin-bottom: 15px; color: #444; font-size: 14px; }
        .summary-total { display: flex; justify-content: space-between; font-size: 18px; font-weight: bold; margin-top: 15px; padding-top: 15px; border-top: 1px solid #ddd; }
        .checkout-btn { width: 100%; padding: 16px 0; margin-top: 25px; background-color: #1a1a1a; color: white; font-size: 15px; text-transform: uppercase; border: none; cursor: pointer; transition: 0.3s; }
        .checkout-btn:hover { background-color: #d2b48c; }

        /* Empty Cart State */
        .empty-cart-msg { text-align: center; font-size: 18px; color: #666; padding: 40px 0; }

        @media (min-width: 768px) {
            .cart-container { margin: 60px auto; }
            .cart-content { flex-direction: row; gap: 60px; }
            .cart-items-section { flex: 2; }
            .order-summary { flex: 1; align-self: flex-start; }
            .cart-item { display: flex; gap: 30px; }
            .item-image { width: 120px; height: 160px; }
            .Nav { gap: 35px; } .Nav a { font-size: 15px; }
        }
    </style>
</head>
<body>

    <header class="top-bar">
        <div class="logo">
            <a href="index.html"><img src="https://cdn.jsdelivr.net/gh/jamba4334-cmd/JAMBA@main/assets/JAMBA.png" alt="JAMBA WEAR Logo" height="30"></a>
        </div>
        <ul class="Nav">
            <li><a href="men.html">Men</a></li>
            <li><a href="women.html">Women</a></li>
            <li><a href="cart.html" id="cart-nav-link" style="font-weight: bold;">Cart (0)</a></li>
        </ul>
    </header>

    <main class="cart-container">
        <h1 class="cart-header">Your Cart</h1>
        
        <div class="cart-content">
            <section class="cart-items-section" id="cart-items-container">
                </section>

            <section class="order-summary" id="order-summary-container">
                <h2 class="summary-title">Order Summary</h2>
                <div class="summary-row">
                    <span>Subtotal</span>
                    <span id="subtotal-price">₹0.00</span>
                </div>
                <div class="summary-row">
                    <span>Shipping</span>
                    <span>Calculated at checkout</span>
                </div>
                <div class="summary-total">
                    <span>Total</span>
                    <span id="total-price">₹0.00</span>
                </div>
                <button class="checkout-btn">Proceed to Checkout</button>
            </section>
        </div>
    </main>

    <script>
        // 1. Get cart data from memory
        let cart = JSON.parse(localStorage.getItem('jambaCart')) || [];
        
        const cartContainer = document.getElementById('cart-items-container');
        const orderSummary = document.getElementById('order-summary-container');
        const navLink = document.getElementById('cart-nav-link');

        // Function to display the cart
        function renderCart() {
            // Update Nav Counter
            navLink.innerText = `Cart (${cart.length})`;

            // If empty, show message and hide summary
            if (cart.length === 0) {
                cartContainer.innerHTML = `<div class="empty-cart-msg">Your cart is currently empty.<br><br><a href="index.html" style="text-decoration:underline; color:#1a1a1a;">Continue Shopping</a></div>`;
                orderSummary.style.display = 'none';
                return;
            }

            orderSummary.style.display = 'block';
            cartContainer.innerHTML = ''; // Clear out old HTML
            let subtotal = 0;

            // Loop through each item in the cart and create HTML for it
            cart.forEach((item, index) => {
                subtotal += (item.price * item.quantity);

                cartContainer.innerHTML += `
                    <div class="cart-item">
                        <img src="${item.image}" alt="${item.name}" class="item-image">
                        <div class="item-details">
                            <div>
                                <h2 class="item-title">${item.name}</h2>
                                <p class="item-variant">Size: ${item.size} | Qty: ${item.quantity}</p>
                            </div>
                            <div class="item-price">₹${item.price.toFixed(2)}</div>
                            <div class="item-actions">
                                <button class="remove-btn" onclick="removeItem(${index})">Remove</button>
                            </div>
                        </div>
                    </div>
                `;
            });

            // Update Totals
            document.getElementById('subtotal-price').innerText = `₹${subtotal.toFixed(2)}`;
            document.getElementById('total-price').innerText = `₹${subtotal.toFixed(2)}`;
        }

        // Function to remove an item
        function removeItem(index) {
            cart.splice(index, 1); // Remove item from array
            localStorage.setItem('jambaCart', JSON.stringify(cart)); // Save new array to memory
            renderCart(); // Refresh the page visual
        }

        // Run the render function when the page loads
        renderCart();
    </script>
</body>
</html>
