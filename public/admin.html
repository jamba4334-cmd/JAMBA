<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JAMBA | Product Injection</title>
    <style>
        :root { --primary: #1a1a1a; --accent: #d2b48c; --bg: #f8f9fa; }
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background: var(--bg); margin: 0; display: flex; color: var(--primary); }
        
        /* Sidebar Control */
        .sidebar { width: 260px; background: var(--primary); color: white; height: 100vh; position: fixed; padding: 40px 20px; box-sizing: border-box; }
        .sidebar h1 { font-size: 18px; letter-spacing: 4px; border-bottom: 1px solid #333; padding-bottom: 20px; margin-top: 0; }
        .nav-link { display: block; color: #888; text-decoration: none; margin: 25px 0; font-size: 12px; text-transform: uppercase; letter-spacing: 1.5px; transition: 0.3s; }
        .nav-link.active { color: white; font-weight: bold; }
        .nav-link:hover { color: var(--accent); }

        /* Dashboard Layout */
        .main-wrapper { margin-left: 260px; padding: 60px; width: 100%; max-width: 1200px; display: grid; grid-template-columns: 1.2fr 0.8fr; gap: 60px; }
        
        .form-section h2 { text-transform: uppercase; letter-spacing: 2px; font-size: 14px; margin-bottom: 40px; }
        
        /* Injection Form */
        label { display: block; font-size: 10px; font-weight: bold; text-transform: uppercase; margin-bottom: 10px; color: #999; }
        input, select, textarea { width: 100%; padding: 15px; margin-bottom: 25px; border: 1px solid #eee; border-radius: 0; font-family: inherit; background: white; transition: 0.3s; }
        input:focus { border-color: var(--accent); outline: none; }
        
        .row { display: flex; gap: 20px; }
        .row div { flex: 1; }

        .btn-inject { background: var(--primary); color: white; border: none; width: 100%; padding: 22px; font-weight: bold; text-transform: uppercase; letter-spacing: 3px; cursor: pointer; transition: 0.4s; margin-top: 20px; }
        .btn-inject:hover { background: var(--accent); color: var(--primary); }
        .btn-inject:disabled { background: #ccc; cursor: not-allowed; }

        /* Live Preview Card */
        .preview-pane { position: sticky; top: 60px; height: fit-content; }
        .preview-card { background: white; border: 1px solid #eee; overflow: hidden; }
        .preview-img { width: 100%; height: 350px; background: #eee; object-fit: cover; }
        .preview-details { padding: 20px; }
        .preview-title { font-size: 18px; font-weight: bold; text-transform: uppercase; margin-bottom: 5px; }
        .preview-price { color: var(--accent); font-weight: bold; font-size: 16px; }
        .old-price { text-decoration: line-through; color: #bbb; font-size: 12px; margin-left: 10px; }
    </style>
</head>
<body>

    <div class="sidebar">
        <h1>JAMBA</h1>
        <p style="color: var(--accent); font-size: 10px; letter-spacing: 1px;">INVENTORY ENGINE</p>
        <nav style="margin-top: 50px;">
            <a href="admin.html" class="nav-link active">Inject Product</a>
            <a href="orders.html" class="nav-link">Order Center</a>
            <a href="../index.html" class="nav-link">Shop Preview</a>
        </nav>
        <div style="position: absolute; bottom: 40px; left: 20px; font-size: 9px; color: #555;">SECURITY: AES-256 ACTIVE</div>
    </div>

    <div class="main-wrapper">
        
        <div class="form-section">
            <h2>Manual Asset Injection</h2>
            <form id="injection-form">
                <label>Product Title</label>
                <input type="text" id="title" placeholder="e.g. Traditional Hand-Woven Waistcoat" required oninput="updatePreview()">

                <div class="row">
                    <div>
                        <label>Category</label>
                        <select id="category">
                            <option value="Men">Men</option>
                            <option value="Women">Women</option>
                        </select>
                    </div>
                    <div>
                        <label>Sub-Category</label>
                        <select id="sub_category">
                            <option value="shirts">Shirts</option>
                            <option value="waistcoats">Waistcoats</option>
                            <option value="accessories">Accessories</option>
                        </select>
                    </div>
                </div>

                <div class="row">
                    <div>
                        <label>MRP (Original Price)</label>
                        <input type="number" id="original_price" placeholder="4999" required oninput="updatePreview()">
                    </div>
                    <div>
                        <label>Selling Price</label>
                        <input type="number" id="selling_price" placeholder="2499" required oninput="updatePreview()">
                    </div>
                </div>

                <label>Media Assets (3 Required)</label>
                <input type="file" id="img1" accept="image/*" required onchange="previewFile(event)">
                <input type="file" id="img2" accept="image/*" required>
                <input type="file" id="img3" accept="image/*" required>

                <label>Product Narrative</label>
                <textarea id="description" rows="5" placeholder="Describe the weave, fabric, and cultural significance..."></textarea>

                <button type="submit" class="btn-inject" id="submit-btn">Push to Live Database</button>
            </form>
        </div>

        <div class="preview-pane">
            <label>Card Preview</label>
            <div class="preview-card">
                <img id="view-img" class="preview-img" src="">
                <div class="preview-details">
                    <div id="view-title" class="preview-title">New Product</div>
                    <span id="view-price" class="preview-price">₹0</span>
                    <span id="view-old" class="old-price">₹0</span>
                </div>
            </div>
            <p style="font-size: 11px; color: #888; margin-top: 15px; text-align: center;">
                This is how the item will appear in the shop.
            </p>
        </div>

    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

        // --- CONFIGURE FIREBASE ---
        const firebaseConfig = { /* PASTE YOUR CONFIG FROM FIREBASE CONSOLE */ };
        const app = initializeApp(firebaseConfig);
        const storage = getStorage(app);
        const RENDER_URL = "https://jamba-backend.onrender.com";

        // LIVE UI UPDATES
        window.updatePreview = () => {
            document.getElementById('view-title').innerText = document.getElementById('title').value || "New Product";
            document.getElementById('view-price').innerText = "₹" + (document.getElementById('selling_price').value || "0");
            document.getElementById('view-old').innerText = "₹" + (document.getElementById('original_price').value || "0");
        };

        window.previewFile = (event) => {
            const output = document.getElementById('view-img');
            output.src = URL.createObjectURL(event.target.files[0]);
        };

        // SUBMISSION LOGIC
        document.getElementById('injection-form').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submit-btn');
            btn.innerText = "UPLOADING ASSETS...";
            btn.disabled = true;

            try {
                const files = [
                    document.getElementById('img1').files[0],
                    document.getElementById('img2').files[0],
                    document.getElementById('img3').files[0]
                ];

                const urls = [];
                for (let file of files) {
                    const sRef = ref(storage, `products/${Date.now()}-${file.name}`);
                    const snap = await uploadBytes(sRef, file);
                    const url = await getDownloadURL(snap.ref);
                    urls.push(url);
                }

                const payload = {
                    title: document.getElementById('title').value,
                    category: document.getElementById('category').value,
                    sub_category: document.getElementById('sub_category').value,
                    original_price: document.getElementById('original_price').value,
                    selling_price: document.getElementById('selling_price').value,
                    description: document.getElementById('description').value,
                    images: urls
                };

                const res = await fetch(`${RENDER_URL}/api/admin-add-product`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if(res.ok) {
                    alert("Success: Product Injected.");
                    window.location.reload();
                }
            } catch (err) {
                alert("Critical Error: " + err.message);
                btn.disabled = false;
                btn.innerText = "Push to Live Database";
            }
        };
    </script>
</body>
</html>
