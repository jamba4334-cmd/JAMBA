<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JAMBA WEAR | Premium Traditional Menswear</title>
    <link rel="stylesheet" href="assets/css/style.css"> <style>
        /* Essential layout for the dynamic grid */
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; background: #f9f9f9; }
        .navbar { background: #000; color: #fff; padding: 1rem; text-align: center; font-weight: bold; font-size: 1.5rem; }
        .hero { background: #eee; padding: 40px; text-align: center; }
        .product-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); 
            gap: 20px; 
            padding: 40px; 
        }
        .product-card { 
            background: #fff; 
            border: 1px solid #ddd; 
            border-radius: 8px; 
            overflow: hidden; 
            transition: transform 0.3s; 
            cursor: pointer;
        }
        .product-card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .product-image { width: 100%; height: 300px; object-fit: cover; }
        .product-info { padding: 15px; text-align: center; }
        .product-title { font-size: 1.1rem; margin-bottom: 10px; color: #333; }
        .product-price { color: #b12704; font-weight: bold; font-size: 1.2rem; }
        .loading-spinner { text-align: center; padding: 50px; font-style: italic; color: #666; }
    </style>
</head>
<body>

    <nav class="navbar">
        JAMBA WEAR
    </nav>

    <header class="hero">
        <h1>New Arrivals 2026</h1>
        <p>Premium traditional patterns for the modern man.</p>
    </header>

    <main id="main-content">
        <div class="product-grid" id="productGrid">
            <div class="loading-spinner">Fetching the latest collection...</div>
        </div>
    </main>

    <script type="module">
        // Import the functions you need from the SDKs
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // Your web app's Firebase configuration
        // PASTE YOUR ACTUAL CONFIG HERE FROM FIREBASE CONSOLE
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "jamba-wear.firebaseapp.com",
            projectId: "jamba-wear",
            storageBucket: "jamba-wear.appspot.com",
            messagingSenderId: "YOUR_ID",
            appId: "YOUR_APP_ID"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Function to load products dynamically
        async function loadProducts() {
            const grid = document.getElementById('productGrid');
            
            try {
                const querySnapshot = await getDocs(collection(db, "products"));
                grid.innerHTML = ""; // Clear the loading spinner

                if (querySnapshot.empty) {
                    grid.innerHTML = "<p>No products found in the database.</p>";
                    return;
                }

                querySnapshot.forEach((doc) => {
                    const product = doc.data();
                    const productId = doc.id;

                    // Generate the HTML for each card
                    grid.innerHTML += `
                        <div class="product-card" onclick="window.location.href='product-detail.html?id=${productId}'">
                            <img class="product-image" src="${product.image}" alt="${product.title}">
                            <div class="product-info">
                                <h3 class="product-title">${product.title}</h3>
                                <p class="product-price">₹${Number(product.price).toLocaleString('en-IN')}</p>
                            </div>
                        </div>
                    `;
                });
            } catch (error) {
                console.error("Error loading products: ", error);
                grid.innerHTML = "<p>Failed to load collection. Please check your Firestore rules.</p>";
            }
        }

        // Run the function
        loadProducts();
    </script>
</body>
</html>
