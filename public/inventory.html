<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JAMBA | Asset Injection</title>
    <style>
        :root { --primary: #1a1a1a; --accent: #d2b48c; --bg: #f8f9fa; }
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background: var(--bg); margin: 0; display: flex; color: var(--primary); }
        
        /* Sidebar */
        .sidebar { width: 260px; background: var(--primary); color: white; height: 100vh; position: fixed; padding: 40px 20px; box-sizing: border-box; }
        .sidebar h1 { font-size: 18px; letter-spacing: 4px; border-bottom: 1px solid #333; padding-bottom: 20px; margin-top: 0; }
        .nav-link { display: block; color: #888; text-decoration: none; margin: 25px 0; font-size: 12px; text-transform: uppercase; letter-spacing: 1.5px; transition: 0.3s; }
        .nav-link.active { color: white; font-weight: bold; }

        /* Layout */
        .main-wrapper { margin-left: 260px; padding: 60px; width: calc(100% - 260px); display: grid; grid-template-columns: 1.2fr 0.8fr; gap: 60px; }
        
        /* Form Styling */
        label { display: block; font-size: 10px; font-weight: bold; text-transform: uppercase; margin-bottom: 10px; color: #999; }
        input, select, textarea { width: 100%; padding: 15px; margin-bottom: 25px; border: 1px solid #ddd; border-radius: 0; font-family: inherit; transition: 0.3s; box-sizing: border-box; }
        input:focus { border-color: var(--accent); outline: none; }
        
        .row { display: flex; gap: 20px; }
        .row div { flex: 1; }

        /* Size Capsules */
        .size-container { display: flex; gap: 10px; margin-bottom: 25px; flex-wrap: wrap; }
        .size-chip { padding: 10px 15px; border: 1px solid #ddd; font-size: 12px; cursor: pointer; transition: 0.3s; background: white; }
        .size-chip.active { background: var(--primary); color: white; border-color: var(--primary); }
        .size-chip.disabled { opacity: 0.3; cursor: not-allowed; background: #eee; }

        .btn-inject { background: var(--primary); color: white; border: none; width: 100%; padding: 22px; font-weight: bold; text-transform: uppercase; letter-spacing: 3px; cursor: pointer; transition: 0.4s; }
        .btn-inject:hover { background: var(--accent); color: var(--primary); }

        /* Preview */
        .preview-pane { position: sticky; top: 60px; height: fit-content; }
        .preview-card { background: white; border: 1px solid #eee; overflow: hidden; }
        .preview-img { width: 100%; height: 350px; background: #eee; object-fit: cover; }
        .preview-details { padding: 20px; }
        .preview-title { font-size: 18px; font-weight: bold; text-transform: uppercase; margin-bottom: 5px; }
        .preview-price { color: var(--accent); font-weight: bold; font-size: 16px; display: block; margin-bottom: 10px; }
        .preview-sizes { font-size: 10px; color: #999; text-transform: uppercase; letter-spacing: 1px; }
    </style>
</head>
<body>

    <div class="sidebar">
        <h1>JAMBA</h1>
        <p style="color: var(--accent); font-size: 10px; letter-spacing: 1px;">INVENTORY ENGINE</p>
        <nav style="margin-top: 50px;">
            <a href="#" class="nav-link active">Inject Product</a>
            <a href="inventory.html" class="nav-link">Control Center</a>
        </nav>
    </div>

    <div class="main-wrapper">
        <div class="form-section">
            <h2 style="text-transform: uppercase; letter-spacing: 2px; font-size: 14px; margin-bottom: 40px;">Manual Asset Injection</h2>
            <form id="injection-form">
                <label>Product Title</label>
                <input type="text" id="title" placeholder="e.g. Geometric Waistcoat" required oninput="updatePreview()">

                <div class="row">
                    <div>
                        <label>Category</label>
                        <select id="category" onchange="toggleSizeLogic()">
                            <option value="Men">Men's Wear</option>
                            <option value="Women">Women's Wear</option>
                            <option value="Accessories">Accessories</option>
                        </select>
                    </div>
                    <div>
                        <label>Selling Price</label>
                        <input type="number" id="selling_price" placeholder="2499" required oninput="updatePreview()">
                    </div>
                </div>

                <div id="size-section">
                    <label>Available Sizes</label>
                    <div class="size-container" id="size-chips">
                        <div class="size-chip" onclick="selectSize(this)">S</div>
                        <div class="size-chip" onclick="selectSize(this)">M</div>
                        <div class="size-chip" onclick="selectSize(this)">L</div>
                        <div class="size-chip" onclick="selectSize(this)">XL</div>
                        <div class="size-chip" onclick="selectSize(this)">XXL</div>
                    </div>
                </div>

                <label>Media Assets</label>
                <input type="file" id="img1" accept="image/*" required onchange="previewFile(event)">
                
                <label>Product Narrative</label>
                <textarea id="description" rows="4" placeholder="Fabric details..."></textarea>

                <button type="submit" class="btn-inject" id="submit-btn">Push to Live Database</button>
            </form>
        </div>

        <div class="preview-pane">
            <label>Card Preview</label>
            <div class="preview-card">
                <img id="view-img" class="preview-img" src="">
                <div class="preview-details">
                    <div id="view-title" class="preview-title">New Product</div>
                    <span id="view-price" class="preview-price">₹0</span>
                    <div id="view-sizes" class="preview-sizes">Sizes: ---</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let selectedSizes = [];

        // Toggle logic for Accessories
        function toggleSizeLogic() {
            const category = document.getElementById('category').value;
            const sizeSection = document.getElementById('size-section');
            const previewSizes = document.getElementById('view-sizes');

            if (category === "Accessories") {
                sizeSection.style.display = "none";
                previewSizes.style.display = "none";
                selectedSizes = []; // Clear selection
                // Reset chips
                document.querySelectorAll('.size-chip').forEach(c => c.classList.remove('active'));
            } else {
                sizeSection.style.display = "block";
                previewSizes.style.display = "block";
            }
            updatePreview();
        }

        function selectSize(element) {
            element.classList.toggle('active');
            const size = element.innerText;
            
            if (element.classList.contains('active')) {
                selectedSizes.push(size);
            } else {
                selectedSizes = selectedSizes.filter(s => s !== size);
            }
            updatePreview();
        }

        function updatePreview() {
            document.getElementById('view-title').innerText = document.getElementById('title').value || "New Product";
            document.getElementById('view-price').innerText = "₹" + (document.getElementById('selling_price').value || "0");
            
            const sizeDisplay = selectedSizes.length > 0 ? selectedSizes.join(', ') : "---";
            document.getElementById('view-sizes').innerText = "Sizes: " + sizeDisplay;
        }

        function previewFile(event) {
            const output = document.getElementById('view-img');
            output.src = URL.createObjectURL(event.target.files[0]);
        }

        // Form Submission (Modified to include sizes)
        document.getElementById('injection-form').onsubmit = async (e) => {
            e.preventDefault();
            // In your real fetch call, add 'sizes: selectedSizes' to your JSON payload
            console.log("Data to send:", {
                title: document.getElementById('title').value,
                category: document.getElementById('category').value,
                sizes: selectedSizes,
                price: document.getElementById('selling_price').value
            });
            alert("Product processed with sizes: " + (selectedSizes.join(', ') || "None"));
        };
    </script>
</body>
</html>
