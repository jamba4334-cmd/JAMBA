<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JAMBA | Classic Linen Waistcoat</title>
    <style>
        /* --- GLOBAL STYLES --- */
        body {
            margin: 0;
            padding: 0;
            background-color: #f5f5f5;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            color: #1a1a1a;
            padding-top: 70px; /* Adjusted for smaller header */
        }

        a { text-decoration: none; color: inherit; }

        /* --- NAVIGATION BAR --- */
        .top-bar {
            display: flex; justify-content: space-between; align-items: center;
            padding: 10px 5%; position: fixed; top: 0; width: 100%; box-sizing: border-box;
            background-color: rgba(245, 245, 245, 0.95); backdrop-filter: blur(8px);
            box-shadow: 0 2px 15px rgba(0, 0, 0, 0.05); z-index: 1000;
        }

        .Nav { display: flex; gap: 15px; list-style: none; margin: 0; padding: 0; }
        .Nav a { font-size: 13px; font-weight: 500; text-transform: uppercase; }

        /* --- PRODUCT VIEW LAYOUT --- */
        .product-container {
            display: flex;
            flex-direction: column; /* Stacked by default for mobile */
            max-width: 1200px;
            margin: 20px auto; 
            padding: 0 5%;
            gap: 30px;
        }

        /* Image Section */
        .product-image-section {
            width: 100%;
            background-color: #fff; /* White background makes the product pop */
            border-radius: 8px;
            overflow: hidden;
        }

        .product-image-section img {
            width: 100%;
            height: auto;
            display: block;
        }

        /* Details Section */
        .product-details {
            width: 100%;
            display: flex;
            flex-direction: column;
        }

        .product-title {
            font-size: 24px;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin: 0 0 8px 0;
        }

        .product-price {
            font-size: 20px;
            font-weight: bold;
            color: #333;
            margin: 0 0 20px 0;
        }

        .product-description {
            font-size: 15px;
            line-height: 1.5;
            color: #555;
            margin-bottom: 30px;
        }

        /* --- SIZE SELECTOR --- */
        .size-selector { margin-bottom: 30px; }
        .size-title {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 12px;
            display: block;
            font-weight: bold;
        }

        .size-options {
            display: grid;
            grid-template-columns: repeat(5, 1fr); /* Equal width buttons */
            gap: 10px;
        }

        .size-btn {
            padding: 12px 0;
            border: 1px solid #ccc;
            background: white;
            cursor: pointer;
            font-size: 14px;
            transition: 0.2s;
        }

        .size-btn:focus {
            background-color: #1a1a1a;
            color: white;
            border-color: #1a1a1a;
        }

        /* --- ADD TO CART BUTTON --- */
        .add-to-cart-btn {
            padding: 18px 0;
            background-color: #1a1a1a;
            color: white;
            font-size: 16px;
            font-weight: bold;
            letter-spacing: 2px;
            text-transform: uppercase;
            border: none;
            width: 100%;
            border-radius: 4px;
        }

        /* --- DESKTOP ADAPTATION --- */
        @media (min-width: 768px) {
            .product-container {
                flex-direction: row; /* Side-by-side for desktop */
                margin: 80px auto;
                gap: 60px;
            }
            .product-image-section, .product-details { flex: 1; }
            .product-title { font-size: 32px; }
            .Nav { gap: 35px; }
            .Nav a { font-size: 15px; }
        }
    </style>
</head>
<body>

    <header class="top-bar">
        <div class="logo">
            <a href="index.html">
                <img src="https://cdn.jsdelivr.net/gh/jamba4334-cmd/JAMBA@main/assets/JAMBA.png" alt="JAMBA Logo" height="30">
            </a>
        </div>
        <ul class="Nav">
            <li><a href="men.html">Men</a></li>
            <li><a href="women.html">Women</a></li>
            <li><a href="cart.html">Cart (0)</a></li>
        </ul>
    </header>

    <main class="product-container">
        
        <section class="product-image-section">
            <img src="https://cdn.jsdelivr.net/gh/jamba4334-cmd/JAMBA@main/waistcoat.png" alt="Classic Linen Waistcoat">
        </section>

        <section class="product-details">
            <h1 class="product-title">Classic Linen Waistcoat</h1>
            <p class="product-price">₹85.00</p>
            
            <p class="product-description">
                Elevate your tailoring with our classic linen waistcoat. Expertly crafted for a breathable, tailored fit, this piece features a subtly textured finish and an adjustable back strap.
            </p>

            <div class="size-selector">
                <span class="size-title">Select Size</span>
                <div class="size-options">
                    <button class="size-btn">S</button>
                    <button class="size-btn">M</button>
                    <button class="size-btn">L</button>
                    <button class="size-btn">XL</button>
                    <button class="size-btn">XXL</button>
                </div>
            </div>

            <button class="add-to-cart-btn">Add to Cart</button>

        </section>

    </main>

</body>
</html>
