<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JAMBA WEAR | Classic Linen Waistcoat</title>
    <style>
        /* --- GLOBAL STYLES --- */
        body { margin: 0; padding-top: 70px; background-color: #f5f5f5; font-family: 'Helvetica Neue', sans-serif; color: #1a1a1a; }
        a { text-decoration: none; color: inherit; }

        /* --- NAVIGATION BAR --- */
        .top-bar { display: flex; justify-content: space-between; align-items: center; padding: 10px 5%; position: fixed; top: 0; width: 100%; box-sizing: border-box; background-color: rgba(245, 245, 245, 0.95); backdrop-filter: blur(8px); box-shadow: 0 2px 15px rgba(0, 0, 0, 0.05); z-index: 1000; }
        .Nav { display: flex; gap: 15px; list-style: none; margin: 0; padding: 0; }
        .Nav a { font-size: 13px; font-weight: 500; text-transform: uppercase; letter-spacing: 1px; }

        /* --- PRODUCT LAYOUT --- */
        .product-container { display: flex; flex-direction: column; max-width: 1200px; margin: 20px auto; padding: 0 5%; gap: 30px; }
        .product-image-section { width: 100%; background-color: #fff; border-radius: 4px; overflow: hidden; display: flex; justify-content: center; }
        .product-image-section img { width: 100%; max-width: 500px; height: auto; }
        .product-details { display: flex; flex-direction: column; }
        .product-title { font-size: 26px; letter-spacing: 1px; text-transform: uppercase; margin: 0 0 10px 0; }
        .product-price { font-size: 22px; font-weight: 600; color: #444; margin: 0 0 20px 0; }
        .product-description { font-size: 15px; line-height: 1.6; color: #555; margin-bottom: 30px; }

        /* --- SIZE SELECTOR --- */
        .size-selector { margin-bottom: 30px; }
        .size-title { font-size: 13px; text-transform: uppercase; font-weight: bold; margin-bottom: 15px; display: block; }
        .size-options { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; }
        .size-btn { padding: 12px 0; border: 1px solid #ccc; background: white; cursor: pointer; font-size: 14px; transition: 0.2s; }
        .size-btn.active { background-color: #1a1a1a; color: white; border-color: #1a1a1a; }

        .add-to-cart-btn { padding: 20px 0; background-color: #1a1a1a; color: white; font-size: 16px; font-weight: bold; text-transform: uppercase; border: none; width: 100%; cursor: pointer; transition: 0.3s; }
        .add-to-cart-btn:hover { background-color: #d2b48c; }

        @media (min-width: 768px) {
            .product-container { flex-direction: row; margin: 60px auto; gap: 80px; }
            .product-image-section, .product-details { flex: 1; }
            .Nav { gap: 35px; } .Nav a { font-size: 15px; }
        }
    </style>
</head>
<body>

    <header class="top-bar">
        <div class="logo">
            <a href="index.html"><img src="https://cdn.jsdelivr.net/gh/jamba4334-cmd/JAMBA@main/assets/JAMBA.png" alt="JAMBA WEAR Logo" height="30"></a>
        </div>
        <ul class="Nav">
            <li><a href="cart.html" id="cart-nav-link">Cart (0)</a></li>
        </ul>
    </header>

    <main class="product-container">
        <section class="product-image-section">
            <img src="https://cdn.jsdelivr.net/gh/jamba4334-cmd/JAMBA@main/waistcoat.png" alt="Classic Linen Waistcoat">
        </section>

        <section class="product-details">
            <h1 class="product-title">Classic Linen Waistcoat</h1>
            <p class="product-price">₹85.00</p>
            <p class="product-description">Elevate your tailoring with our classic linen waistcoat. Expertly crafted for a breathable, tailored fit.</p>

            <div class="size-selector">
                <span class="size-title">Select Size</span>
                <div class="size-options">
                    <button class="size-btn">S</button>
                    <button class="size-btn">M</button>
                    <button class="size-btn">L</button>
                    <button class="size-btn">XL</button>
                    <button class="size-btn">XXL</button>
                </div>
            </div>

            <button class="add-to-cart-btn">Add to Cart</button>
        </section>
    </main>

    <script>
        // 1. Initialize Cart from LocalStorage
        let cart = JSON.parse(localStorage.getItem('jambaCart')) || [];
        document.getElementById('cart-nav-link').innerText = `Cart (${cart.length})`;

        // 2. Handle Size Selection
        let selectedSize = null;
        const sizeButtons = document.querySelectorAll('.size-btn');
        
        sizeButtons.forEach(button => {
            button.addEventListener('click', () => {
                sizeButtons.forEach(btn => btn.classList.remove('active'));
                button.classList.add('active');
                selectedSize = button.innerText;
            });
        });

        // 3. Add to Cart Logic
        document.querySelector('.add-to-cart-btn').addEventListener('click', () => {
            if (!selectedSize) {
                alert("Please select a size first!");
                return;
            }

            // Create the item object
            const item = {
                id: "waistcoat-001",
                name: "Classic Linen Waistcoat",
                price: 85.00,
                size: selectedSize,
                image: "https://cdn.jsdelivr.net/gh/jamba4334-cmd/JAMBA@main/waistcoat.png",
                quantity: 1
            };

            // Check if this exact item (same id AND size) is already in the cart
            const existingItemIndex = cart.findIndex(cartItem => cartItem.id === item.id && cartItem.size === item.size);

            if (existingItemIndex > -1) {
                cart[existingItemIndex].quantity += 1; // Increase quantity if already there
            } else {
                cart.push(item); // Add new item if not
            }

            // Save to browser memory
            localStorage.setItem('jambaCart', JSON.stringify(cart));

            // Redirect to Cart Page
            window.location.href = "cart.html";
        });
    </script>
</body>
</html>
