<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JAMBA WEAR | Login</title>
    <style>
        :root { --primary: #1a1a1a; --accent: #d2b48c; --bg: #f8f8f8; }
        body { margin: 0; font-family: 'Helvetica Neue', sans-serif; background-color: var(--bg); display: flex; justify-content: center; align-items: center; height: 100vh; }
        
        .login-container { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); width: 100%; max-width: 400px; text-align: center; }
        .logo img { height: 40px; margin-bottom: 20px; }
        h2 { margin-bottom: 30px; font-weight: 300; letter-spacing: 1px; text-transform: uppercase; }

        input { width: 100%; padding: 12px; margin-bottom: 20px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; font-size: 16px; outline: none; transition: border 0.3s; }
        input:focus { border-color: var(--accent); }
        
        .btn { width: 100%; padding: 14px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; transition: 0.3s; margin-bottom: 15px; }
        .btn:disabled { background-color: #ccc; cursor: not-allowed; }
        .btn-primary { background-color: var(--primary); color: white; }
        .btn-google { background-color: white; color: #555; border: 1px solid #ddd; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .btn:hover:not(:disabled) { opacity: 0.9; transform: translateY(-1px); }

        #otp-section { display: none; margin-top: 30px; padding-top: 20px; border-top: 1px solid #eee; animation: fadeIn 0.4s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .divider { margin: 20px 0; color: #aaa; font-size: 11px; display: flex; align-items: center; letter-spacing: 1px; }
        .divider::before, .divider::after { content: ""; flex: 1; height: 1px; background: #eee; margin: 0 10px; }
        #error-msg { color: #d9534f; font-size: 12px; margin-bottom: 15px; display: none; }
        .footer-link { margin-top: 15px; font-size: 12px; color: #888; }
        .footer-link a { color: var(--primary); font-weight: bold; text-decoration: none; }
    </style>
</head>
<body>

    <div class="login-container">
        <div class="logo"><img src="https://raw.githubusercontent.com/jamba4334-cmd/JAMBA/main/assets/JAMBA.png" alt="JAMBA"></div>
        <h2>Login</h2>

        <div id="error-msg"></div>

        <button class="btn btn-google" id="google-login">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="20">
            Continue with Google
        </button>

        <div class="divider">OR USE PHONE</div>

        <div id="phone-section">
            <input type="tel" id="phone-number" value="+91 " maxlength="14">
            <div id="recaptcha-container"></div> 
            <button class="btn btn-primary" id="send-otp">Send OTP</button>
            <div class="footer-link">New to JAMBA? <a href="signup.html">Sign Up</a></div>
        </div>

        <div id="otp-section">
            <p style="font-size: 12px; color: #666; margin-bottom: 15px;">Enter the 6-digit code sent to your phone</p>
            <input type="text" id="otp-code" placeholder="Enter OTP" maxlength="6">
            <button class="btn btn-primary" id="verify-otp">Verify & Login</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, RecaptchaVerifier, signInWithPhoneNumber } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBgH8hpWJ97mqLFfoDDW9A_78pR5YjEmxo",
            authDomain: "jamba-wear.firebaseapp.com",
            projectId: "jamba-wear",
            appId: "1:679544590258:web:eac3841e5f555e3fb89eab"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const CHECK_USER_URL = "https://jamba-backend.onrender.com/check-user";

        const showError = (msg) => {
            const errDiv = document.getElementById('error-msg');
            errDiv.innerText = msg;
            errDiv.style.display = 'block';
        };

        // --- NEW LOGIC: CHECK IF USER EXISTS IN MONGODB ---
        async function handleUserRouting(user) {
            const identifier = user.email || user.phoneNumber;
            try {
                const response = await fetch(`${CHECK_USER_URL}?id=${identifier}`);
                const result = await response.json();

                if (result.exists) {
                    window.location.href = "index.html"; // Old User -> Home
                } else {
                    window.location.href = "signup.html"; // New User -> Profile Setup
                }
            } catch (error) {
                console.error("Routing Error:", error);
                window.location.href = "index.html"; // Fallback
            }
        }

        // Google Login
        document.getElementById('google-login').onclick = async () => {
            try {
                const result = await signInWithPopup(auth, new GoogleAuthProvider());
                handleUserRouting(result.user);
            } catch (error) { showError("Google Login Failed."); }
        };

        // Phone OTP Logic
        let confirmationResult;
        document.getElementById('send-otp').onclick = async () => {
            const phoneNumber = document.getElementById('phone-number').value.replace(/\s/g, ''); 
            if (phoneNumber.length < 13) { showError("Please enter a 10-digit number."); return; }
            
            const btn = document.getElementById('send-otp');
            btn.disabled = true;
            btn.innerText = "Sending...";
            const verifier = new RecaptchaVerifier(auth, 'recaptcha-container', { 'size': 'invisible' });

            try {
                confirmationResult = await signInWithPhoneNumber(auth, phoneNumber, verifier);
                document.getElementById('phone-section').style.display = 'none';
                document.getElementById('otp-section').style.display = 'block';
            } catch (error) {
                btn.disabled = false;
                btn.innerText = "Send OTP";
                showError("Error: " + error.message);
            }
        };

        document.getElementById('verify-otp').onclick = async () => {
            const btn = document.getElementById('verify-otp');
            const code = document.getElementById('otp-code').value;
            btn.disabled = true;
            btn.innerText = "Verifying...";
            try {
                const result = await confirmationResult.confirm(code);
                handleUserRouting(result.user);
            } catch (error) {
                btn.disabled = false;
                btn.innerText = "Verify & Login";
                showError("Invalid OTP.");
            }
        };
    </script>
</body>
</html>
