<script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, RecaptchaVerifier, signInWithPhoneNumber } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBgH8hpWJ97mqLFfoDDW9A_78pR5YjEmxo",
            authDomain: "jamba-wear.firebaseapp.com",
            projectId: "jamba-wear",
            storageBucket: "jamba-wear.firebasestorage.app",
            messagingSenderId: "679544590258",
            appId: "1:679544590258:web:eac3841e5f555e3fb89eab",
            measurementId: "G-8XSNJG079Z"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const showError = (msg) => {
            const errDiv = document.getElementById('error-msg');
            errDiv.innerText = msg;
            errDiv.style.display = 'block';
        };

        // Locked +91 Logic
        const phoneInput = document.getElementById('phone-number');
        const prefix = "+91 ";
        phoneInput.addEventListener('keydown', (e) => {
            if (phoneInput.selectionStart <= prefix.length && (e.key === 'Backspace' || e.key === 'Delete')) e.preventDefault();
        });
        phoneInput.addEventListener('input', () => { if (!phoneInput.value.startsWith(prefix)) phoneInput.value = prefix; });

        // Google Login
        const googleProvider = new GoogleAuthProvider();
        document.getElementById('google-login').onclick = async () => {
            try {
                // 1. Trigger the popup
                const result = await signInWithPopup(auth, googleProvider);
                const user = result.user;

                // 2. Ensure they have a database profile for the backend
                const userRef = doc(db, "users", user.uid);
                const userSnap = await getDoc(userRef);
                
                if (!userSnap.exists()) {
                    await setDoc(userRef, {
                        name: user.displayName || "JAMBA Customer",
                        email: user.email || "",
                        phone: user.phoneNumber || "",
                        role: "customer",
                        createdAt: new Date().toISOString()
                    });
                }

                window.location.href = "index.html";
            } catch (error) { 
                console.error("Auth Error:", error);
                // THIS WILL NOW SHOW YOU THE EXACT REASON IT IS FAILING
                showError("Error: " + error.message); 
            }
        };

        // Phone OTP Logic
        let confirmationResult;
        const initRecaptcha = () => {
            if (!window.recaptchaVerifier) {
                window.recaptchaVerifier = new RecaptchaVerifier(auth, 'recaptcha-container', { 'size': 'invisible' });
            }
        };

        document.getElementById('send-otp').onclick = async () => {
            const btn = document.getElementById('send-otp');
            const phoneNumber = phoneInput.value.replace(/\s/g, ''); 
            if (phoneNumber.length < 13) { showError("Please enter a 10-digit number."); return; }

            btn.disabled = true;
            btn.innerText = "Sending...";
            initRecaptcha();

            try {
                confirmationResult = await signInWithPhoneNumber(auth, phoneNumber, window.recaptchaVerifier);
                document.getElementById('phone-section').style.display = 'none';
                document.getElementById('otp-section').style.display = 'block';
                document.getElementById('error-msg').style.display = 'none';
            } catch (error) {
                btn.disabled = false;
                btn.innerText = "Send OTP";
                showError("Error: " + error.message);
                if (window.grecaptcha) window.grecaptcha.reset();
                window.recaptchaVerifier = null;
            }
        };

        document.getElementById('verify-otp').onclick = async () => {
            const btn = document.getElementById('verify-otp');
            const code = document.getElementById('otp-code').value;
            btn.disabled = true;
            btn.innerText = "Verifying...";
            try {
                const result = await confirmationResult.confirm(code);
                const user = result.user;

                // Ensure phone users also get a database profile
                const userRef = doc(db, "users", user.uid);
                const userSnap = await getDoc(userRef);
                
                if (!userSnap.exists()) {
                    await setDoc(userRef, {
                        name: "JAMBA Customer",
                        email: "",
                        phone: user.phoneNumber,
                        role: "customer",
                        createdAt: new Date().toISOString()
                    });
                }

                window.location.href = "index.html";
            } catch (error) {
                btn.disabled = false;
                btn.innerText = "Verify & Login";
                showError("Invalid OTP: " + error.message);
            }
        };
    </script>
