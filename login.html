<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JAMBA WEAR | Login</title>
    <style>
        :root { --primary: #1a1a1a; --bg: #f8f8f8; }
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background-color: var(--bg); display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .login-card { background: white; padding: 40px; border-radius: 8px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); width: 100%; max-width: 400px; text-align: center; }
        .logo img { height: 30px; margin-bottom: 20px; }
        h2 { text-transform: uppercase; letter-spacing: 2px; font-size: 18px; margin-bottom: 30px; }
        input { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }
        .btn-login { width: 100%; padding: 14px; background: var(--primary); color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; }
        .btn-login:hover { background: #333; }
        .footer-link { margin-top: 20px; font-size: 13px; color: #777; }
        .footer-link a { color: var(--primary); font-weight: bold; text-decoration: none; }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="logo"><img src="https://raw.githubusercontent.com/jamba4334-cmd/JAMBA/main/assets/JAMBA.png" alt="JAMBA"></div>
        <h2>Member Login</h2>
        
        <input type="email" id="email" placeholder="Email Address">
        <input type="password" id="password" placeholder="Password">
        
        <button class="btn-login" id="login-btn">Sign In</button>

        <div class="footer-link">
            Don't have an account? <a href="signup.html">Join Us</a>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyBgH8hpWJ97mqLFfoDDW9A_78pR5YjEmxo", 
            authDomain: "jamba-wear.firebaseapp.com", 
            projectId: "jamba-wear" 
            // ... (rest of your config)
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        document.getElementById('login-btn').addEventListener('click', () => {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            signInWithEmailAndPassword(auth, email, password)
                .then((userCredential) => {
                    // SUCCESSFUL LOGIN LOGIC
                    console.log("Logged in:", userCredential.user);

                    // 1. Check if there is a redirect instruction in the URL
                    const urlParams = new URLSearchParams(window.location.search);
                    const redirectPage = urlParams.get('redirect');

                    if (redirectPage === 'cart') {
                        // 2. Send them back to the cart to finish the order
                        window.location.href = "cart.html";
                    } else {
                        // 3. Otherwise, go to home page
                        window.location.href = "index.html";
                    }
                })
                .catch((error) => {
                    alert("Login failed: " + error.message);
                });
        });
    </script>
</body>
</html>
