<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JAMBA WEAR | Login</title>
    <style>
        :root { --primary: #1a1a1a; --accent: #d2b48c; --bg: #f8f8f8; }
        body { margin: 0; font-family: 'Helvetica Neue', sans-serif; background-color: var(--bg); display: flex; justify-content: center; align-items: center; height: 100vh; }
        
        .login-container { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); width: 100%; max-width: 400px; text-align: center; }
        .logo img { height: 40px; margin-bottom: 20px; }
        h2 { margin-bottom: 20px; font-weight: 300; letter-spacing: 1px; text-transform: uppercase; }

        input { width: 100%; padding: 12px; margin-bottom: 20px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; font-size: 16px; outline: none; transition: border 0.3s; }
        input:focus { border-color: var(--accent); }
        
        .btn { width: 100%; padding: 14px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; transition: 0.3s; margin-bottom: 15px; }
        .btn:disabled { background-color: #ccc; cursor: not-allowed; }
        .btn-primary { background-color: var(--primary); color: white; }
        .btn-google { background-color: white; color: #555; border: 1px solid #ddd; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .btn:hover:not(:disabled) { opacity: 0.9; transform: translateY(-1px); }

        #otp-section, #profile-section { display: none; margin-top: 20px; padding-top: 20px; border-top: 1px solid #eee; animation: fadeIn 0.4s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .divider { margin: 20px 0; color: #aaa; font-size: 11px; display: flex; align-items: center; letter-spacing: 1px; }
        .divider::before, .divider::after { content: ""; flex: 1; height: 1px; background: #eee; margin: 0 10px; }
        
        #error-msg { color: #d9534f; font-size: 12px; margin-bottom: 15px; display: none; text-align: center; font-weight: 500; }
        .change-num { font-size: 11px; color: #888; text-decoration: underline; cursor: pointer; margin-top: 10px; display: block; text-transform: uppercase; letter-spacing: 1px; }
    </style>
</head>
<body>

    <div class="login-container">
        <div class="logo"><img src="https://raw.githubusercontent.com/jamba4334-cmd/JAMBA/main/assets/JAMBA.png" alt="JAMBA"></div>
        
        <div id="login-view">
            <h2>Sign In</h2>
            <div id="error-msg"></div>

            <button class="btn btn-google" id="google-login">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="20">
                Continue with Google
            </button>

            <div class="divider" id="divider-text">OR USE PHONE</div>

            <div id="phone-section">
                <input type="tel" id="phone-number" value="+91 " maxlength="14">
                <div id="recaptcha-container"></div> 
                <button class="btn btn-primary" id="send-otp">Send OTP</button>
            </div>

            <div id="otp-section">
                <p style="font-size: 12px; color: #666; margin-bottom: 15px;">Enter the 6-digit code sent to your phone</p>
                <input type="text" id="otp-code" placeholder="Enter OTP" maxlength="6">
                <button class="btn btn-primary" id="verify-otp">Verify & Login</button>
                <span class="change-num" onclick="location.reload()">← Change Phone Number</span>
            </div>
        </div>

        <div id="profile-section">
            <h2 style="font-size: 18px; color: var(--primary);">Complete Your Profile</h2>
            <p style="font-size: 12px; color: #666; margin-bottom: 20px;">Please provide your details to continue.</p>
            
            <input type="text" id="prof-name" placeholder="Full Name">
            <input type="email" id="prof-email" placeholder="Email Address">
            <input type="tel" id="prof-phone" placeholder="Phone Number (+91...)">
            
            <button class="btn btn-primary" id="save-profile">Save & Enter Store</button>
        </div>

        <div id="success-banner" style="display:none; background:#dcfce7; padding:15px; border-radius:8px; margin-top:20px; color:#166534; font-weight:bold;">
            Logging you in...
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        // IMPORT SETPERSISTENCE TO FIX ANDROID WEBVIEW AMNESIA
        import { getAuth, GoogleAuthProvider, signInWithPopup, signInWithRedirect, getRedirectResult, RecaptchaVerifier, signInWithPhoneNumber, onAuthStateChanged, setPersistence, browserLocalPersistence } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBgH8hpWJ97mqLFfoDDW9A_78pR5YjEmxo",
            authDomain: "jamba-wear.firebaseapp.com",
            projectId: "jamba-wear",
            storageBucket: "jamba-wear.firebasestorage.app",
            messagingSenderId: "679544590258",
            appId: "1:679544590258:web:eac3841e5f555e3fb89eab",
            measurementId: "G-8XSNJG079Z"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let currentUser = null;

        const showError = (msg) => {
            const errDiv = document.getElementById('error-msg');
            errDiv.innerText = msg; errDiv.style.display = 'block';
        };

        // --- ANDROID WEBVIEW FIX: FORCE LOCAL PERSISTENCE BEFORE ANYTHING ELSE ---
        setPersistence(auth, browserLocalPersistence).catch((error) => {
            console.error("Persistence Error:", error);
        });

        window.addEventListener('DOMContentLoaded', async () => {
            try { await getRedirectResult(auth); } 
            catch (error) { console.error("Redirect Error:", error); }
        });

        // --- GLOBAL AUTH STATE LISTENER ---
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                document.getElementById('login-view').style.display = 'none';
                
                try {
                    const userRef = doc(db, "users", user.uid);
                    const userSnap = await getDoc(userRef);
                    
                    let userData = {};
                    if (!userSnap.exists()) {
                        userData = {
                            name: user.displayName || "",
                            email: user.email || "",
                            phone: user.phoneNumber || "",
                            role: "customer",
                            createdAt: new Date().toISOString()
                        };
                        await setDoc(userRef, userData);
                    } else {
                        userData = userSnap.data();
                    }

                    // CHECK IF WE NEED MORE DATA
                    if (!userData.name || !userData.email || !userData.phone) {
                        // Show Profile Collection Form
                        document.getElementById('profile-section').style.display = 'block';
                        document.getElementById('prof-name').value = userData.name || "";
                        document.getElementById('prof-email').value = userData.email || "";
                        document.getElementById('prof-phone').value = userData.phone || "+91 ";
                    } else {
                        // All data exists, redirect to store immediately
                        document.getElementById('success-banner').style.display = 'block';
                        window.location.assign("./index.html");
                    }
                } catch (e) {
                    console.warn("Database sync error", e);
                    window.location.assign("./index.html");
                }
            }
        });

        // --- HANDLE SAVING MISSING CUSTOMER DATA ---
        document.getElementById('save-profile').onclick = async () => {
            const name = document.getElementById('prof-name').value.trim();
            const email = document.getElementById('prof-email').value.trim();
            const phone = document.getElementById('prof-phone').value.trim();

            if (!name || !email || !phone || phone.length < 13) {
                alert("Please fill in all details correctly.");
                return;
            }

            document.getElementById('save-profile').innerText = "Saving...";
            try {
                await updateDoc(doc(db, "users", currentUser.uid), {
                    name: name,
                    email: email,
                    phone: phone
                });
                window.location.assign("./index.html");
            } catch (error) {
                console.error("Error saving data:", error);
                alert("Could not save profile. Entering store anyway.");
                window.location.assign("./index.html");
            }
        };

        // --- HYBRID GOOGLE LOGIN ---
        const googleProvider = new GoogleAuthProvider();
        document.getElementById('google-login').onclick = async () => {
            try {
                document.getElementById('google-login').innerText = "Connecting...";
                const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
                
                if (isMobile) {
                    await signInWithRedirect(auth, googleProvider);
                } else {
                    await signInWithPopup(auth, googleProvider);
                }
            } catch (error) { 
                showError(error.message); 
                document.getElementById('google-login').innerText = "Continue with Google";
            }
        };

        // --- PHONE OTP LOGIC ---
        const phoneInput = document.getElementById('phone-number');
        const prefix = "+91 ";
        phoneInput.addEventListener('keydown', (e) => {
            if (phoneInput.selectionStart <= prefix.length && (e.key === 'Backspace' || e.key === 'Delete')) e.preventDefault();
        });
        phoneInput.addEventListener('input', () => { if (!phoneInput.value.startsWith(prefix)) phoneInput.value = prefix; });

        let confirmationResult;
        const initRecaptcha = () => {
            if (!window.recaptchaVerifier) window.recaptchaVerifier = new RecaptchaVerifier(auth, 'recaptcha-container', { 'size': 'invisible' });
        };

        document.getElementById('send-otp').onclick = async () => {
            const btn = document.getElementById('send-otp');
            const phoneNumber = phoneInput.value.replace(/\s/g, ''); 
            if (phoneNumber.length < 13) { showError("Please enter a 10-digit number."); return; }
            btn.disabled = true; btn.innerText = "Sending..."; initRecaptcha();
            try {
                confirmationResult = await signInWithPhoneNumber(auth, phoneNumber, window.recaptchaVerifier);
                document.getElementById('phone-section').style.display = 'none';
                document.getElementById('otp-section').style.display = 'block';
                document.getElementById('error-msg').style.display = 'none';
            } catch (error) {
                btn.disabled = false; btn.innerText = "Send OTP";
                showError(error.message);
                if (window.grecaptcha) window.grecaptcha.reset(); window.recaptchaVerifier = null;
            }
        };

        document.getElementById('verify-otp').onclick = async () => {
            const btn = document.getElementById('verify-otp');
            const code = document.getElementById('otp-code').value;
            btn.disabled = true; btn.innerText = "Verifying...";
            try {
                await confirmationResult.confirm(code);
            } catch (error) {
                btn.disabled = false; btn.innerText = "Verify & Login";
                showError("Invalid OTP: " + error.message);
            }
        };
    </script>
</body>
</html>
